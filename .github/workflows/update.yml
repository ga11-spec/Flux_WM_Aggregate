name: Mise à jour World Monitor
on:
  schedule:
    - cron: '*/30 * * * *'   # LÉGER : toutes les 30 min (mets '0 * * * *' pour horaire)
    - cron: '0 4 * * 1'      # COMPLET : lundi 04:00 UTC (re-scan archive + gros exports)
  workflow_dispatch:          # bouton "Run workflow" avec choix du mode
    inputs:
      mode:
        description: "Mode d'exécution"
        type: choice
        options: [leger, complet]
        default: leger
permissions:
  contents: write
concurrency:
  group: update
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache des modèles de traduction
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/argos-translate
            ~/.local/cache/argos-translate
          key: argos-models-v1
      - name: Dépendances (traduction NON bloquante)
        run: |
          pip install openpyxl
          pip install argostranslate && python -c "import argostranslate.translate; print('Argos OK')" \
            || echo "⚠ Argos indisponible pour ce run — la traduction sera sautée, tout le reste continue"
      - name: Collecte des flux RSS (catalogue World Monitor)
        run: python pipeline/collecteur.py
      - name: Classification + régénération du site
        run: |
          if [ "${{ github.event.schedule }}" = "0 4 * * 1" ] || [ "${{ github.event.inputs.mode }}" = "complet" ]; then
            echo "== Mode COMPLET (re-scan archive + gros exports) =="
            python pipeline/assembler.py --full
          else
            echo "== Mode léger (nouveaux articles + data.js) =="
            python pipeline/assembler.py
          fi
      - name: Publier les mises à jour
        run: |
          git config user.name "wm-bot"
          git config user.email "wm-bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add -A
          git diff --staged --quiet || git commit -m "Mise à jour automatique $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

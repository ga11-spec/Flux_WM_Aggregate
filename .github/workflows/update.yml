name: Mise à jour World Monitor

on:
  schedule:
    - cron: '*/30 * * * *'   # toutes les 30 minutes (GitHub peut décaler de quelques minutes)
  workflow_dispatch:          # + bouton "Run workflow" pour lancer à la main

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Dépendances
        run: pip install -r requirements.txt

      - name: Collecte des flux RSS (catalogue World Monitor)
        run: python pipeline/collecteur.py

      - name: Classification + régénération du site
        run: python pipeline/assembler.py

      - name: Publier les mises à jour
        run: |
          git config user.name "wm-bot"
          git config user.email "wm-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Mise à jour automatique $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

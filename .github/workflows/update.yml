name: Mise à jour World Monitor

on:
  schedule:
    - cron: '*/30 * * * *'   # toutes les 30 minutes (GitHub peut décaler)
  workflow_dispatch:          # + bouton "Run workflow"

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache des modèles de traduction
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/argos-translate
            ~/.local/cache/argos-translate
          key: argos-models-v1

      - name: Dépendances (traduction NON bloquante)
        run: |
          pip install openpyxl
          pip install argostranslate && python -c "import argostranslate.translate; print('Argos OK')" \
            || echo "⚠ Argos indisponible pour ce run — la traduction sera sautée, tout le reste continue"

      - name: Collecte des flux RSS (catalogue World Monitor)
        run: python pipeline/collecteur.py

      - name: Classification + régénération du site
        run: python pipeline/assembler.py

      - name: Publier les mises à jour
        run: |
          git config user.name "wm-bot"
          git config user.email "wm-bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add -A
          git diff --staged --quiet || git commit -m "Mise à jour automatique $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
